name: Backend CI/CD

on:
  push:
    branches: [master]
    paths:
      - "app/**"
      - "tests/**"
      - "alembic/**"
      - "alembic.ini"
      - "requirements.txt"
      - "Dockerfile"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [master]
    paths:
      - "app/**"
      - "tests/**"
      - "alembic/**"
      - "alembic.ini"
      - "requirements.txt"
      - "Dockerfile"
      - ".github/workflows/backend.yml"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check .

