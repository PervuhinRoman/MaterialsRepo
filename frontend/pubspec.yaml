name: materials_repo
description: Web repository of educational materials.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP
  dio: ^5.9.2

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.3.0

  # Secure storage (JWT)
  flutter_secure_storage: ^10.3.1

  # Immutable models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3


flutter:
  uses-material-design: true
  assets:
    - assets/images/

